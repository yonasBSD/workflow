version: 2

project_name: wf

before:
  hooks:
    - go mod tidy
    - go test -race ./...

builds:
  - id: wf
    binary: wf
    main: .
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}
    flags:
      - -trimpath

archives:
  - id: default
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE
      - README.md

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

signs:
  - artifacts: checksum
    args:
      - "--batch"
      - "--local-user"
      - "{{ .Env.GPG_FINGERPRINT }}"
      - "--output"
      - "${signature}"
      - "--detach-sign"
      - "${artifact}"

release:
  github:
    owner: joelfokou
    name: workflow
  draft: false
  prerelease: auto
  name_template: "v{{.Version}}"
  header: |
    ## wf v{{.Version}}

    See the [Changelog](https://joelfokou.github.io/workflow/changelog/) for a full description of changes.

    **Install**:
    ```bash
    curl -fsSL https://joelfokou.github.io/workflow/install.sh | sh
    ```
  footer: |
    **Full Changelog**: https://github.com/joelfokou/workflow/compare/v{{.PreviousTag}}...v{{.Tag}}

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"
      - "Merge pull request"
      - "Merge branch"
  groups:
    - title: "Features"
      regexp: "^feat"
      order: 0
    - title: "Bug Fixes"
      regexp: "^fix"
      order: 1
    - title: "Security"
      regexp: "^security"
      order: 2
    - title: "Performance"
      regexp: "^perf"
      order: 3
    - title: "Other"
      order: 999

sboms:
  - artifacts: archive
