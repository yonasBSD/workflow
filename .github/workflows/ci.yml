name: CI

on:
  push:
    branches: ["master", "feat/**", "fix/**", "security/**"]
  pull_request:
    branches: ["master"]

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: Tidy
        run: go mod tidy

      - name: Format check
        run: |
          gofmt -l .
          test -z "$(gofmt -l .)"

      - name: Vet
        run: go vet ./...

      - name: Test (race detector)
        run: go test -race -count=1 ./...

      - name: Security tests
        run: go test -race -count=1 ./tests/security/...

      - name: Benchmarks (smoke — 1 iteration each)
        run: go test ./tests/benchmarks/... -bench=. -benchmem -benchtime=1x

      - name: Example validation (parse + build all examples)
        run: go test -v -run TestExamplesValidate ./tests/examples/...

      - name: Build
        run: go build -o wf .

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          # golangci-lint-action@v6 ships with golangci-lint v2; our .golangci.yml
          # uses the v2 config schema (version: "2"). Do not pin to a v1.x version.
          args: --timeout=5m
